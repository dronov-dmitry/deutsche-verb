name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK and AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - run: |
          mkdir -p ../release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk ../release-artifacts/deutsche-verb-android.apk
          cp build/app/outputs/bundle/release/app-release.aab ../release-artifacts/deutsche-verb-android.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: release-artifacts/*

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --base-href="./"
      - run: |
          cd build/web
          zip -r ../../../deutsche-verb-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: deutsche-verb-web.zip

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ../deutsche-verb-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: deutsche-verb-windows-x64.zip

  linux:
    name: Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          tar -czf ../deutsche-verb-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: deutsche-verb-linux-x64.tar.gz

  macos:
    name: macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/deutsche_verb.app ../deutsche-verb-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: deutsche-verb-macos.zip

  ios:
    name: iOS unsigned app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: |
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app ../deutsche-verb-ios-unsigned.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: deutsche-verb-ios-unsigned.zip

  release:
    name: GitHub Release
    if: always()
    needs: [android, web, windows, linux, macos, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -maxdepth 3 -type f -print
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
